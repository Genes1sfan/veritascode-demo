const LangContext = React.createContext({ lang:"EN", setLang:()=>{}, t:LOCALES.EN });

const LangProvider = ({children}) => {
  const [lang, setLangRaw] = React.useState(() => {
    try { return localStorage.getItem("veritasLang") || "EN"; } catch(_) { return "EN"; }
  });
  const setLang = (l) => {
    setLangRaw(l);
    try { localStorage.setItem("veritasLang", l); } catch(_) {}
  };
  const t = LOCALES[lang] || LOCALES.EN;
  React.useEffect(() => {
    document.documentElement.lang = t.htmlLang;
  }, [lang]);
  return (
    <LangContext.Provider value={{ lang, setLang, t }}>
      {children}
    </LangContext.Provider>
  );
};

const useLang = () => React.useContext(LangContext);

Object.assign(window, { LOCALES, LangContext, LangProvider, useLang });

// Scroll reveal hook — sets .in when element enters viewport
const useReveal = () => {
  const ref = React.useRef(null);
  React.useEffect(()=>{
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if (e.isIntersecting){ el.classList.add("in"); io.unobserve(el); } });
    }, {threshold:0.12});
    io.observe(el);
    return ()=>io.disconnect();
  },[]);
  return ref;
};

// Animated counter for stats like "72%" / "11min"
const CountUp = ({value, suffix="", prefix="", duration=1400}) => {
  const ref = React.useRef(null);
  const [n, setN] = React.useState(0);
  React.useEffect(()=>{
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e])=>{
      if (!e.isIntersecting) return;
      io.disconnect();
      const start = performance.now();
      const raf = (t)=>{
        const k = Math.min(1, (t-start)/duration);
        const ease = 1 - Math.pow(1-k, 3);
        setN(value * ease);
        if (k<1) requestAnimationFrame(raf);
      };
      requestAnimationFrame(raf);
    },{threshold:0.4});
    io.observe(el);
    return ()=>io.disconnect();
  },[value, duration]);
  const display = value % 1 === 0 ? Math.round(n) : n.toFixed(1);
  return <span ref={ref}>{prefix}{display}{suffix}</span>;
};

// Languages + coverage — compact split card inside white page

const Languages = () => {
  const {t} = useLang();
  const c = t.coverage;
  const [now, setNow] = React.useState(new Date());
  React.useEffect(()=>{
    const timer = setInterval(()=>setNow(new Date()), 60000);
    return ()=>clearInterval(timer);
  },[]);
  const hour = (now.getUTCHours() + 1 + now.getUTCMinutes()/60);

  return (
    <section className="section coverage-section" id="approach">
      <div className="wrap">
        <div className="section-head">
          <div className="eyebrow">{c.eyebrow}</div>
          <h2>{c.h2_a} <em>{c.h2_em}</em></h2>
        </div>

        <div className="coverage-card">

            <div className="coverage-label mono">{c.nativeLabel}</div>
            <ul>
              {c.langs.map(l=>(
                <li key={l.code}>
                  <Flag code={l.flag}/>
                  <div className="lang-name">{l.name}</div>
                  <div className="lang-country">{l.country}</div>
                  <div className="lang-level">{l.level}</div>
                </li>
              ))}
            </ul>
          </div>

          <div className="coverage-tz">
            <div className="coverage-label mono">{c.hoursLabel}</div>
            <div className="tz-bar">
              {Array.from({length:24}).map((_,h)=>{
                const on = h>=8 && h<18;
                const core = h>=9 && h<12 || h>=13 && h<17;
                return <div key={h} className={"tz-cell"+(on?" on":"")+(core?" core":"")}/>;
              })}
              <div className="tz-now" style={{left:`${(hour/24)*100}%`}}/>
            </div>
            <div className="tz-legend mono">
              <span>00</span><span>06</span><span>12</span><span>18</span><span>24</span>
            </div>
            <div className="coverage-stats">
              <div>
                <div className="stat-num">08–18</div>
                <div className="stat-lbl mono">{c.stat1Lbl}</div>
              </div>
              <div>
                <div className="stat-num">CET±0</div>
                <div className="stat-lbl mono">{c.stat2Lbl}</div>
              </div>
              <div>
                <div className="stat-num">{c.stat3}</div>
                <div className="stat-lbl mono">{c.stat3Lbl}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
};

// ===== src/onboarding.jsx =====
// Onboarding — three steps, single compact form, centered

const Onboarding = () => {
  const {t} = useLang();
  const o = t.onb;
  const BLANK = {name:"",email:"",company:"",size:"15–50",msg:""};
  const [form, setForm] = React.useState(BLANK);
  const [submitted, setSubmitted] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = () => {
    const to = (window.EMAILS && window.EMAILS.MAIN) || "info@veritascode.net";
    const subject = `Veritas Code enquiry — ${form.company || form.name || "new lead"}`;
    const lines = [
      `Name:     ${form.name}`,
      `Email:    ${form.email}`,
      `Company:  ${form.company}`,
      `Size:     ${form.size}`,
      ``,
      `What they would delegate first:`,
      form.msg || "(not provided)",
      ``,
      `— Sent from veritascode.net contact form`,
    ];
    const body = lines.join("\n");
    const href = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    try { window.location.href = href; } catch(_) {}
    setSubmitted(true);
  };

  React.useEffect(() => {
    if (!submitted) return;
    const id = setTimeout(() => {
      setSubmitted(false);
      setForm(BLANK);
    }, 5000);
    return () => clearTimeout(id);
  }, [submitted]);

  return (
    <section className="onb-section" id="contact">
      <div className="wrap">
        <div className="section-head onb-head">
          <div className="eyebrow">{o.eyebrow}</div>
          <h2>{o.h2_a} <em>{o.h2_em}</em></h2>
        </div>

        <div className="onb-steps">
          {o.steps.map((s,i)=>(
            <div key={i} className="onb-step">
              <div className="onb-step-n mono">{o.stepLbl} {String(i+1).padStart(2,"0")}</div>
              <h4>{s.t}</h4>
              <p>{s.d}</p>
            </div>
          ))}
        </div>

        <div className="onb-form">
          {submitted ? (
            <div className="onb-thanks">
              <div className="onb-thanks-h">{o.thanks}</div>
              <p>{o.thanksP}</p>
            </div>
          ) : (
            <>
              <div className="onb-form-head">
                <h3>{o.formH}</h3>
                <p>{o.formP}</p>
                <div className="onb-phones">
                  <a href={`tel:${PHONES.MD.replace(/\s/g,"")}`}><Phone/> MD {PHONES.MD}</a>
                  <a href={`tel:${PHONES.UK.replace(/\s/g,"")}`}><Phone/> UK {PHONES.UK}</a>
                  <a href={`tel:${PHONES.RO.replace(/\s/g,"")}`}><Phone/> RO {PHONES.RO}</a>
                </div>
              </div>
              <div className="onb-fields">
                <div className="fld-row">
                  <div className="fld"><label>{o.lblName}</label><input value={form.name} onChange={e=>set("name",e.target.value)} placeholder={o.phName}/></div>
                  <div className="fld"><label>{o.lblEmail}</label><input value={form.email} onChange={e=>set("email",e.target.value)} placeholder={o.phEmail}/></div>
                </div>
                <div className="fld-row">
                  <div className="fld"><label>{o.lblCompany}</label><input value={form.company} onChange={e=>set("company",e.target.value)} placeholder={o.phCompany}/></div>
                  <div className="fld">
                    <label>{o.lblSize}</label>
                    <div className="seg seg-dark">
                      {["5–15","15–50","50–150","150+"].map(s=>(
                        <button key={s} type="button"
                          className={form.size===s?"active":""}
                          onClick={()=>set("size",s)}>{s}</button>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="fld">
                  <label>{o.lblDelegate}</label>
                  <textarea rows="3" value={form.msg} onChange={e=>set("msg",e.target.value)} placeholder={o.phDelegate}/>
                </div>
                <div className="onb-submit">
                  <span className="note mono">{o.note}</span>
                  <button className="btn btn-primary" onClick={submit}>{o.send} <Arrow/></button>
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </section>
  );
};

Object.assign(window, { Onboarding });

// Root app + tweaks panel

const ACCENTS = {
  default: {ink:"#0693e3", label:"Veritas cyan"},
  navy:    {ink:"#0a47a0", label:"Deep navy"},
  forest:  {ink:"#2f6f4a", label:"Forest"},
  ink:     {ink:"#0a1a2f", label:"Ink"},
};

const TweaksPanel = ({tweaks,setT}) => (
  <div className="tweaks-panel">
    <h4>Tweaks</h4>
    <div className="tweak-row">
      <label>Accent</label>
      <div className="swatches">
        {Object.entries(ACCENTS).map(([k,v])=>(
          <button key={k} className={"sw-btn"+(tweaks.accent===k?" active":"")}
            style={{background:v.ink}} onClick={()=>setT({accent:k})} title={v.label}/>
        ))}
      </div>
    </div>
    <div className="tweak-row">
      <label>Display type</label>
      <button className={"toggle"+(tweaks.serifHero?" on":"")} onClick={()=>setT({serifHero:!tweaks.serifHero})}/>
    </div>
  </div>
);

const App = () => {
  const [tweaks, setTweaks] = React.useState(window.TWEAKS || {});

  React.useEffect(()=>{
    document.body.className = (tweaks.accent && tweaks.accent!=="default") ? "accent-"+tweaks.accent : "";
    document.documentElement.style.setProperty("--display",
      tweaks.serifHero ? '"Instrument Serif", Georgia, serif' : '"Syne", system-ui, sans-serif');
  }, [tweaks]);

  const setT = (patch) => {
    setTweaks(prev => ({...prev, ...patch}));
  };

  return (
